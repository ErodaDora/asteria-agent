<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Agent</title>
    <link rel="stylesheet" href="/research-agent.css?v=stage1">
</head>
<body>
<div class="page-shell">
    <header class="app-header">
        <div>
            <p class="eyebrow">Paper Research</p>
            <h1>Research Agent</h1>
            <p class="header-copy">检索公开论文元数据，筛选候选文献，并把值得阅读的论文先收藏入库。</p>
        </div>
        <div class="header-actions">
            <span class="status-pill" id="pageStatusText">准备检索</span>
            <button class="ghost-button" id="backToWorkspaceButton" type="button">返回 Workspace</button>
        </div>
    </header>

    <main class="research-layout">
        <aside class="search-panel" aria-label="论文检索条件">
            <div class="panel-title">
                <span>检索条件</span>
                <small>OpenAlex</small>
            </div>

            <label class="field">
                <span>研究问题 / 关键词</span>
                <input id="queryInput" type="text" placeholder="Watermark, RAG evaluation">
            </label>

            <label class="field">
                <span>期刊 / 会议名</span>
                <input id="venueInput" type="text" placeholder="ACM, TMM, CVPR">
            </label>

            <label class="field">
                <span>范围</span>
                <select id="scopeSelect">
                    <option value="all" selected>全部</option>
                    <option value="journal">期刊</option>
                    <option value="conference">会议</option>
                </select>
            </label>

            <div class="field-row">
                <label class="field">
                    <span>起始年份</span>
                    <input id="fromYearInput" type="number" min="1900" max="2100" value="2022">
                </label>

                <label class="field">
                    <span>截止年份</span>
                    <input id="toYearInput" type="number" min="1900" max="2100" value="2026" placeholder="不限">
                </label>
            </div>

            <label class="field">
                <span>结果数</span>
                <select id="limitSelect">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                </select>
            </label>

            <button id="runSearchButton" class="primary-button" type="button">开始检索</button>

            <div class="quick-actions" aria-label="快速检索">
                <button id="fillMcpButton" class="text-button" type="button">MCP 相关</button>
                <button id="fillRagButton" class="text-button" type="button">RAG 相关</button>
            </div>

            <p class="inline-hint" id="searchStatusText">输入主题词后开始检索。ACM 会自动识别为 ACM Multimedia。</p>
        </aside>

        <section class="results-panel" aria-label="论文检索结果">
            <div class="panel-title results-title">
                <div>
                    <span>检索结果</span>
                    <small id="resultsSummary">还没有检索结果。</small>
                </div>
            </div>
            <div class="results-list" id="resultsList">
                <div class="empty-state">
                    <strong>从一个关键词开始。</strong>
                    <p>先检索论文元数据，再把候选文献收藏进本地库，后续接摘要级 RAG 和 PDF 解析。</p>
                </div>
            </div>
        </section>

        <aside class="collection-panel" aria-label="论文收藏库">
            <div class="panel-title">
                <span>收藏库</span>
                <small id="collectionSummary">加载中</small>
            </div>
            <button id="indexCollectionButton" class="secondary-button" type="button">索引收藏库</button>
            <label class="field compact-field">
                <span>语义检索收藏</span>
                <input id="semanticQueryInput" type="text" placeholder="robust watermark extraction">
            </label>
            <button id="semanticSearchButton" class="ghost-button full-button" type="button">检索索引</button>
            <p class="inline-hint" id="indexStatusText">收藏论文后可生成摘要向量索引。</p>
            <div class="semantic-list" id="semanticList"></div>
            <div class="collection-list" id="collectionList"></div>
        </aside>
    </main>
</div>

<script src="/research-agent.js?v=stage1"></script>
</body>
</html>
